<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @font-face { font-family: 'Inter'; src: local('Inter'); }
    body { margin: 0; background: #05070c; }
    * { box-sizing: border-box; font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 0; }
  </style>
</helmet>

<div style="display:flex; width:100%; height:100vh; background:#05070c; overflow:hidden;">

  <!-- SIDEBAR -->
  <div style="position:relative; flex-shrink:0; width:{{ sidebarWidth }}px; height:100%; background:linear-gradient(180deg,#0b0f17,#080a10); border-right:1px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; transition:width 480ms cubic-bezier(0.65,0,0.35,1); overflow:hidden;">

    <!-- Logo row -->
    <div style="display:flex; align-items:center; gap:14px; padding:24px 22px; white-space:nowrap;">
      <div style="width:36px; height:36px; min-width:36px; border-radius:10px; background:radial-gradient(circle at 30% 30%, #3b82f6, #1d4ed8); display:flex; align-items:center; justify-content:center; box-shadow:0 0 18px rgba(59,130,246,0.45);">
        <div style="width:16px; height:12px; border:2px solid #cfe0ff; border-radius:3px;"></div>
      </div>
      <div style="font-size:18px; font-weight:700; color:#f2f4f8; opacity:{{ labelOpacity }}; transform:translateX({{ labelShift }}px); transition:opacity 320ms ease, transform 420ms cubic-bezier(0.65,0,0.35,1); letter-spacing:0.2px;">DataMind</div>
    </div>

    <!-- Collapse toggle -->
    <button onClick="{{ toggleCollapsed }}" style="position:absolute; top:36px; right:-14px; width:28px; height:28px; border-radius:50%; background:#11151d; border:1px solid rgba(255,255,255,0.1); color:#9aa4b2; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:5; transition:transform 480ms cubic-bezier(0.65,0,0.35,1), background 200ms ease;" style-hover="background:#1a2030; color:#e5eaf2;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="transform:rotate({{ chevronRotation }}deg); transition:transform 480ms cubic-bezier(0.65,0,0.35,1);">
        <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>

    <!-- Nav: main group -->
    <div style="display:flex; flex-direction:column; gap:4px; padding:20px 14px 0; flex:1; overflow-y:auto; overflow-x:hidden;">
      <sc-for list="{{ mainItems }}" as="item" hint-placeholder-count="9">
        <div onClick="{{ item.select }}" style="display:flex; align-items:center; gap:16px; padding:11px 12px; border-radius:12px; cursor:pointer; white-space:nowrap; background:{{ item.bg }}; box-shadow:{{ item.glow }}; transition:background 260ms ease, box-shadow 260ms ease;" style-hover="background:{{ item.hoverBg }};">
          <div style="width:22px; height:22px; min-width:22px; display:flex; align-items:center; justify-content:center; color:{{ item.color }}; transition:color 260ms ease;">

            <sc-if value="{{ item.icon === 'dashboard' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" fill="currentColor"></rect><rect x="13" y="3" width="8" height="8" rx="2" fill="currentColor" opacity="0.55"></rect><rect x="3" y="13" width="8" height="8" rx="2" fill="currentColor" opacity="0.55"></rect><rect x="13" y="13" width="8" height="8" rx="2" fill="currentColor"></rect></svg></sc-if>
            <sc-if value="{{ item.icon === 'datasets' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="6" rx="8" ry="3" fill="currentColor"></ellipse><path d="M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6" stroke="currentColor" stroke-width="2" fill="none"></path></svg></sc-if>
            <sc-if value="{{ item.icon === 'catalog' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="3" fill="currentColor"></circle><circle cx="5" cy="19" r="3" fill="currentColor"></circle><circle cx="19" cy="19" r="3" fill="currentColor"></circle><path d="M12 8v6M12 14l-6 3M12 14l6 3" stroke="currentColor" stroke-width="2"></path></svg></sc-if>
            <sc-if value="{{ item.icon === 'analytics' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><rect x="4" y="12" width="4" height="9" rx="1" fill="currentColor"></rect><rect x="10" y="7" width="4" height="14" rx="1" fill="currentColor"></rect><rect x="16" y="3" width="4" height="18" rx="1" fill="currentColor"></rect></svg></sc-if>
            <sc-if value="{{ item.icon === 'insights' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="6" fill="currentColor" opacity="0.85"></circle><rect x="9" y="18" width="6" height="3" rx="1" fill="currentColor"></rect></svg></sc-if>
            <sc-if value="{{ item.icon === 'recommendations' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" fill="currentColor"></path></svg></sc-if>
            <sc-if value="{{ item.icon === 'rules' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="6" r="3" fill="currentColor"></circle><circle cx="6" cy="18" r="3" fill="currentColor"></circle><path d="M6 9v3a5 5 0 0 0 5 5h7" stroke="currentColor" stroke-width="2" fill="none"></path></svg></sc-if>
            <sc-if value="{{ item.icon === 'confidence' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M12 2l8 3v6c0 5-3.5 9-8 11-4.5-2-8-6-8-11V5z" fill="currentColor"></path></svg></sc-if>
            <sc-if value="{{ item.icon === 'aichat' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="13" rx="4" fill="currentColor"></rect><path d="M9 21l3-4h4" fill="none"></path><path d="M9 21l3-4" stroke="currentColor" stroke-width="0"></path></svg></sc-if>

            <span style="font-size:12px;"></span>
          </div>
          <span style="font-size:15px; font-weight:{{ item.weight }}; color:{{ item.color }}; opacity:{{ labelOpacity }}; transform:translateX({{ labelShift }}px); transition:opacity 300ms ease, transform 420ms cubic-bezier(0.65,0,0.35,1), color 260ms ease;">{{ item.label }}</span>
        </div>
      </sc-for>
    </div>

    <!-- Divider -->
    <div style="height:1px; background:rgba(255,255,255,0.08); margin:14px 20px;"></div>

    <!-- Secondary group -->
    <div style="display:flex; flex-direction:column; gap:4px; padding:0 14px;">
      <sc-for list="{{ secondaryItems }}" as="item" hint-placeholder-count="2">
        <div onClick="{{ item.select }}" style="display:flex; align-items:center; gap:16px; padding:11px 12px; border-radius:12px; cursor:pointer; white-space:nowrap;" style-hover="background:rgba(255,255,255,0.05);">
          <div style="width:22px; height:22px; min-width:22px; display:flex; align-items:center; justify-content:center; color:#8a93a3;">
            <sc-if value="{{ item.icon === 'settings' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="2" fill="none"></circle><circle cx="12" cy="12" r="2.5" fill="currentColor"></circle></svg></sc-if>
            <sc-if value="{{ item.icon === 'billing' }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="3" stroke="currentColor" stroke-width="2" fill="none"></rect><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"></line></svg></sc-if>
          </div>
          <span style="font-size:15px; font-weight:500; color:#c4cad4; opacity:{{ labelOpacity }}; transform:translateX({{ labelShift }}px); transition:opacity 300ms ease, transform 420ms cubic-bezier(0.65,0,0.35,1);">{{ item.label }}</span>
        </div>
      </sc-for>
    </div>

    <!-- Profile row -->
    <div style="display:flex; align-items:center; gap:14px; padding:20px 22px; margin-top:8px; border-top:1px solid rgba(255,255,255,0.08); white-space:nowrap;">
      <div style="width:36px; height:36px; min-width:36px; border-radius:50%; background:#1d4ed8; display:flex; align-items:center; justify-content:center; color:#dce6ff; font-weight:700; font-size:15px;">A</div>
      <div style="flex:1; font-size:15px; font-weight:600; color:#e7eaf0; opacity:{{ labelOpacity }}; transform:translateX({{ labelShift }}px); transition:opacity 300ms ease, transform 420ms cubic-bezier(0.65,0,0.35,1);">Aadhar Bindal</div>
      <div style="opacity:{{ labelOpacity }}; transform:translateX({{ labelShift }}px); transition:opacity 300ms ease, transform 420ms cubic-bezier(0.65,0,0.35,1); color:#8a93a3; display:flex;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke="currentColor" stroke-width="2" fill="none"></path><path d="M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" fill="none"></path></svg>
      </div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div style="flex:1; display:flex; align-items:center; justify-content:center; background:#05070c;">
    <div style="text-align:center; color:#5b6472; font-size:15px; max-width:360px; line-height:1.6;">
      <div style="font-size:17px; color:#dfe3ea; font-weight:600; margin-bottom:8px;">DataMind workspace</div>
      Click the arrow on the sidebar edge to collapse and expand it.
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { collapsed: false, active: 'dashboard' };

  select(id) {
    this.setState({ active: id });
  }

  renderVals() {
    const collapsed = this.state.collapsed;
    const active = this.state.active;

    const activeColor = '#5b9bff';
    const inactiveColor = '#9aa4b2';

    const defs = [
      { id: 'dashboard', icon: 'dashboard', label: 'Dashboard' },
      { id: 'datasets', icon: 'datasets', label: 'Datasets' },
      { id: 'catalog', icon: 'catalog', label: 'Data Catalog' },
      { id: 'analytics', icon: 'analytics', label: 'Analytics' },
      { id: 'insights', icon: 'insights', label: 'Insights' },
      { id: 'recommendations', icon: 'recommendations', label: 'Recommendations' },
      { id: 'rules', icon: 'rules', label: 'Rules' },
      { id: 'confidence', icon: 'confidence', label: 'Confidence Center' },
      { id: 'aichat', icon: 'aichat', label: 'AI Chat' },
    ];

    const mainItems = defs.map(d => {
      const isActive = d.id === active;
      return {
        ...d,
        select: () => this.select(d.id),
        color: isActive ? activeColor : inactiveColor,
        weight: isActive ? 600 : 500,
        bg: isActive ? 'rgba(59,130,246,0.16)' : 'transparent',
        hoverBg: isActive ? 'rgba(59,130,246,0.16)' : 'rgba(255,255,255,0.05)',
        glow: isActive ? '0 0 0 1px rgba(59,130,246,0.25)' : 'none',
      };
    });

    const secondaryItems = [
      { id: 'settings', icon: 'settings', label: 'Settings' },
      { id: 'billing', icon: 'billing', label: 'Billing' },
    ];

    return {
      sidebarWidth: collapsed ? 84 : 288,
      labelOpacity: collapsed ? 0 : 1,
      labelShift: collapsed ? -8 : 0,
      chevronRotation: collapsed ? 180 : 0,
      toggleCollapsed: () => this.setState(s => ({ collapsed: !s.collapsed })),
      mainItems,
      secondaryItems,
    };
  }
}

</script>
</body>
</html>
