<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #050609; }
  </style>
  <script>window.OM_SCENES = '[{"name":"Dashboard","dur":12}]';</script>
  <script>window.OM_PLAYBACK = '{"mode":"loop"}';</script>
  <script>window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"motionEditor": true}/*EDITMODE-END*/;</script>
</helmet>

<div style="width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:#050609; overflow:hidden;">
  <div style="width:1920px; height:1080px; flex-shrink:0; transform-origin:center center;" ref="{{ stageRef }}">
    <x-import component-from-global-scope="DashboardVideo" from="./animations-v2.jsx ./dashboard-scene.jsx" hint-size="1920px,1080px"></x-import>
  </div>
  <x-import component-from-global-scope="AppTweaks" from="./tweaks-panel.jsx ./app-tweaks.jsx" hint-size="0,0"></x-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  stageRef = React.createRef();

  fit = () => {
    const el = this.stageRef.current;
    if (!el) return;
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    el.style.transform = `scale(${scale})`;
  };

  componentDidMount() {
    this.fit();
    window.addEventListener('resize', this.fit);
    setTimeout(this.fit, 100);
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this.fit);
  }

  renderVals() {
    return { stageRef: this.stageRef };
  }
}

</script>
</body>
</html>
