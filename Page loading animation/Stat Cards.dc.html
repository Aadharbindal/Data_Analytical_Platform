<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @keyframes cardIn {
      0% { opacity: 0; transform: translateY(18px) scale(0.97); }
      60% { opacity: 1; }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes iconPop {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.12); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes glowSweep {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(220%); }
    }
    body { margin: 0; background: oklch(0.16 0.01 260); }
  </style>
</helmet>

<div style="display:flex; gap:24px; padding:40px; background: oklch(0.16 0.01 260); flex-wrap:wrap; font-family: Helvetica, Arial, sans-serif;">
  <sc-for list="{{ cards }}" as="card" hint-placeholder-count="4">
    <div style="{{ card.cardStyle }}">
      <div style="{{ card.sweepStyle }}"></div>
      <div style="display:flex; align-items:center; gap:14px; position:relative; z-index:1;">
        <div style="{{ card.iconWrapStyle }}">
          <div style="{{ card.iconStyle }}">{{ card.icon }}</div>
        </div>
        <div style="color:oklch(0.75 0.02 260); font-size:17px; line-height:1.3;">{{ card.label }}</div>
      </div>
      <div style="{{ card.valueStyle }}">{{ card.displayValue }}</div>
    </div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1520,&quot;height&quot;:320}}">
const CARDS_DATA = [
  { key: 'amount', label: 'Total Transaction Amount', iconType: 'dollar', iconColor: 'oklch(0.75 0.16 300)', iconBg: 'oklch(0.28 0.08 300)', numeric: 6.01, suffix: 'Cr', prefix: '₹' },
  { key: 'accounts', label: 'Total Accounts', iconType: 'people', iconColor: 'oklch(0.75 0.14 250)', iconBg: 'oklch(0.28 0.07 250)', numeric: 72, suffix: '', prefix: '' },
  { key: 'avg', label: 'Total Average Transaction Value', iconType: 'card', iconColor: 'oklch(0.75 0.14 165)', iconBg: 'oklch(0.28 0.07 165)', numeric: 12.5, suffix: 'K', prefix: '₹' },
  { key: 'completion', label: 'Transaction Completion Rate', iconType: 'pulse', iconColor: 'oklch(0.72 0.16 45)', iconBg: 'oklch(0.28 0.08 45)', numeric: 91.6, suffix: '%', prefix: '' },
];

class Component extends DCLogic {
  state = { mounted: false, counts: CARDS_DATA.map(() => 0) };

  componentDidMount() {
    // trigger entrance animation just after first paint (avoids the "already there" pop on real render)
    requestAnimationFrame(() => {
      requestAnimationFrame(() => this.setState({ mounted: true }));
    });

    // count-up numbers, staggered per card
    CARDS_DATA.forEach((c, i) => {
      const delay = 150 + i * 110;
      const duration = 900;
      setTimeout(() => {
        const start = performance.now();
        const step = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          this.setState((s) => {
            const counts = s.counts.slice();
            counts[i] = c.numeric * eased;
            return { counts };
          });
          if (t < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, delay);
    });
  }

  formatNum(c, n) {
    if (c.key === 'accounts') return Math.round(n).toString();
    if (c.key === 'completion') return n.toFixed(1) + '%';
    return c.prefix + n.toFixed(2).replace(/\.00$/, '') + c.suffix;
  }

  renderVals() {
    const mounted = this.state.mounted;
    const cards = CARDS_DATA.map((c, i) => {
      const delay = i * 90;
      const base = {
        position: 'relative',
        overflow: 'hidden',
        flex: '1 1 260px',
        minWidth: '260px',
        background: 'oklch(0.2 0.012 260)',
        border: '1px solid oklch(0.28 0.012 260)',
        borderRadius: '16px',
        padding: '26px 28px',
        boxShadow: '0 8px 24px oklch(0.05 0 0 / 0.35)',
        opacity: mounted ? 1 : 0,
        transform: mounted ? 'translateY(0) scale(1)' : 'translateY(18px) scale(0.97)',
        transition: `opacity 0.55s cubic-bezier(0.22,1,0.36,1) ${delay}ms, transform 0.55s cubic-bezier(0.22,1,0.36,1) ${delay}ms`,
      };
      return {
        key: c.key,
        label: c.label,
        iconType: c.iconType,
        displayValue: this.formatNum(c, this.state.counts[i]),
        cardStyle: base,
        sweepStyle: {
          position: 'absolute',
          top: 0, left: 0, bottom: 0,
          width: '60%',
          background: 'linear-gradient(100deg, transparent, oklch(1 0 0 / 0.05), transparent)',
          transform: 'translateX(-120%)',
          animation: mounted ? `glowSweep 1.1s ease-out ${delay + 250}ms forwards` : 'none',
          pointerEvents: 'none',
        },
        iconWrapStyle: {
          width: '44px', height: '44px',
          borderRadius: '12px',
          background: c.iconBg,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          flexShrink: 0,
          transform: mounted ? 'scale(1)' : 'scale(0.5)',
          opacity: mounted ? 1 : 0,
          transition: `transform 0.5s cubic-bezier(0.34,1.56,0.64,1) ${delay + 120}ms, opacity 0.4s ease ${delay + 120}ms`,
        },
        iconStyle: {
          color: c.iconColor,
          fontSize: '19px',
          fontWeight: 600,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
        },
        valueStyle: {
          marginTop: '18px',
          fontSize: '34px',
          fontWeight: 700,
          color: 'oklch(0.98 0 0)',
          letterSpacing: '-0.01em',
          fontVariantNumeric: 'tabular-nums',
        },
      };
    });
    return { cards };
  }
}

</script>
</body>
</html>
